name: Generate Posts from CSV

on:
  workflow_dispatch: # <--- This creates the manual run button!
  push:
    paths:
      - 'algae_data.csv'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run generation script
      run: python generate_posts.py
           python generate_literature.py

    - name: Commit and Push Changes
      run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add -A  # <--- This fixes the error by staging additions AND deletions!
          
          # Only commit if there are actually changes to push, preventing empty run crashes
          git diff-index --quiet HEAD || git commit -m "Auto-generated posts and purged duplicates"
          git push origin main
